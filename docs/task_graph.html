<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🗡️ Shadow Monarch — Quest Graph</title>
<style>
  :root{
    --bg:#0a0d16; --surface:#11151f; --line:#1e2430;
    --ink:#e6edf3; --ink-2:#9aa4b2; --ink-3:#6e7681;
    --done:#3fb950; --current:#a371f7; --pending:#7d8590; --locked:#30363d;
    --accent:#a371f7;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden}
  body{background:var(--bg);color:var(--ink);
       font:14px/1.5 -apple-system,"Segoe UI",Roboto,sans-serif}
  canvas{display:block;cursor:grab}
  canvas.dragging{cursor:grabbing}

  header{position:fixed;top:0;left:0;right:0;z-index:5;pointer-events:none;
         padding:14px 18px;display:flex;flex-wrap:wrap;gap:8px 18px;align-items:baseline;
         background:linear-gradient(180deg,rgba(10,13,22,.92),rgba(10,13,22,0))}
  h1{font-size:17px;font-weight:700;letter-spacing:.3px}
  h1 .sub{color:var(--ink-2);font-weight:400;font-size:13px;margin-left:8px}
  #stats{display:flex;gap:14px;font-size:12.5px;color:var(--ink-2)}
  #stats b{color:var(--ink);font-variant-numeric:tabular-nums}
  #src{font-size:11px;color:var(--ink-3);border:1px solid var(--line);
       border-radius:20px;padding:1px 9px}
  #src.live{color:#7ee38a;border-color:#274a30}

  #legend{position:fixed;left:18px;bottom:16px;z-index:5;display:flex;gap:14px;
          font-size:12px;color:var(--ink-2);background:rgba(17,21,31,.85);
          border:1px solid var(--line);border-radius:10px;padding:8px 14px}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;
       vertical-align:baseline}
  #hint{position:fixed;right:18px;bottom:16px;z-index:5;font-size:11.5px;color:var(--ink-3)}

  #tip{position:fixed;z-index:6;pointer-events:none;display:none;max-width:240px;
       background:rgba(17,21,31,.96);border:1px solid var(--line);border-radius:8px;
       padding:7px 11px;font-size:12.5px;box-shadow:0 6px 24px rgba(0,0,0,.5)}
  #tip .t{font-weight:600}
  #tip .s{color:var(--ink-2);font-size:11.5px}

  #panel{position:fixed;top:64px;right:14px;z-index:6;width:270px;display:none;
         background:rgba(17,21,31,.97);border:1px solid var(--line);border-radius:12px;
         padding:16px;box-shadow:0 10px 40px rgba(0,0,0,.6)}
  #panel h2{font-size:15px;margin-bottom:2px}
  #panel .badge{display:inline-block;font-size:11px;font-weight:600;border-radius:20px;
                padding:1px 10px;margin:6px 0 10px}
  #panel p{color:var(--ink-2);font-size:12.5px;margin-bottom:10px}
  #panel a{color:var(--accent);font-size:12.5px;text-decoration:none}
  #panel a:hover{text-decoration:underline}
  #panel .x{position:absolute;top:8px;right:12px;cursor:pointer;color:var(--ink-3);
            font-size:16px;border:none;background:none}
  #panel .x:hover{color:var(--ink)}
  @media (max-width:600px){
    #legend{left:10px;right:10px;bottom:10px;justify-content:space-between;gap:6px;
            font-size:10.5px;padding:6px 8px}
    #hint{display:none}
    #panel{width:calc(100vw - 28px)}
  }
</style>
</head>
<body>
<header>
  <h1>🗡️ Quest Graph<span class="sub">Road to ML Foundation</span></h1>
  <div id="stats">
    <span>Weeks <b id="stW">–</b></span>
    <span>Week-1 days <b id="stD">–</b></span>
    <span>Overall <b id="stP">–</b></span>
  </div>
  <span id="src">loading…</span>
</header>

<div id="legend">
  <span><span class="dot" style="background:var(--done)"></span>✓ done</span>
  <span><span class="dot" style="background:var(--current);box-shadow:0 0 6px var(--current)"></span>current</span>
  <span><span class="dot" style="background:var(--pending)"></span>pending</span>
  <span><span class="dot" style="background:var(--locked);outline:1px solid #484f58"></span>🔒 locked</span>
</div>
<div id="hint">drag rotate · scroll zoom · click a node</div>
<div id="tip"></div>
<div id="panel">
  <button class="x" onclick="panel.style.display='none'">✕</button>
  <h2 id="pTitle"></h2>
  <span class="badge" id="pBadge"></span>
  <p id="pDesc"></p>
  <a id="pLink" target="_blank" rel="noopener"></a>
</div>
<canvas id="cv"></canvas>

<script>
"use strict";
/* ────────────────────────── quest structure ────────────────────────── */
const REPO = "https://github.com/ChingangbamDpakAngom/Road-to-ML-foundation";
const RAW  = "https://raw.githubusercontent.com/ChingangbamDpakAngom/Road-to-ML-foundation/main/PROGRESS.md";

const PHASES = [
  {id:"p1", name:"Python",           ring:"#58a6ff", weeks:[1]},
  {id:"p2", name:"Data Stack",       ring:"#bc8cff", weeks:[2,3,4]},
  {id:"p3", name:"Math for ML",      ring:"#e3b341", weeks:[5,6]},
  {id:"p4", name:"Machine Learning", ring:"#ff7b72", weeks:[7,8,9]},
  {id:"p5", name:"Job-Ready",        ring:"#f0883e", weeks:[10,11]},
  {id:"p6", name:"Bridge to DL",     ring:"#39d2c0", weeks:[12,13]},
];
const WEEK_NAMES = {1:"Python Sprint",2:"NumPy",3:"Pandas",4:"Visualization · Capstone 1",
  5:"Linear Algebra",6:"Calculus + Probability",7:"Regression",8:"Classifiers",
  9:"Unsupervised + Evaluation",10:"SQL",11:"Capstone 2 🏆",12:"From-Scratch Neural Net",
  13:"Interview Prep"};
const DAY_NAMES = ["Setup · variables · control flow","Data structures + comprehensions",
  "Functions & functional Python","OOP — bank account system","Decorators & generators",
  "Files · exceptions · type hints","Project: CLI Task Manager"];
const GUIDE1 = REPO + "/blob/main/guides/week01_python_sprint.md";

/* ─────────────────────── progress (live fetch) ─────────────────────── */
const progress = {weeks:{}, days:{}, currentWeek:1};   // false=pending true=done
for (let w=1; w<=13; w++) progress.weeks[w] = false;
for (let d=1; d<=7;  d++) progress.days[d]  = false;

async function loadProgress(){
  const srcEl = document.getElementById("src");
  try{
    const md = await (await fetch(RAW + "?t=" + Date.now())).text();
    let m;
    const wRe = /^- \[([ x])\] \*\*Week (\d+)/gm;
    while ((m = wRe.exec(md))) progress.weeks[+m[2]] = m[1] === "x";
    const dRe = /^- \[([ x])\] \*\*Day (\d+)\*\*/gm;
    while ((m = dRe.exec(md))) progress.days[+m[2]] = m[1] === "x";
    const cw = md.match(/👉 Week (\d+)/);
    if (cw) progress.currentWeek = +cw[1];
    if (Object.values(progress.days).every(v=>v)) progress.weeks[1] = true;
    srcEl.textContent = "● live from GitHub"; srcEl.className = "live";
  }catch(e){
    srcEl.textContent = "offline snapshot";
  }
  applyStatus(); updateStats();
}

function weekStatus(w){
  if (progress.weeks[w]) return "done";
  if (w === progress.currentWeek) return "current";
  return "pending";
}
function dayStatus(d){
  if (progress.days[d]) return "done";
  const firstOpen = [1,2,3,4,5,6,7].find(i => !progress.days[i]);
  return (progress.currentWeek === 1 && d === firstOpen) ? "current" : "pending";
}
function phaseStatus(p){
  if (p.weeks.every(w => progress.weeks[w])) return "done";
  if (p.weeks.includes(progress.currentWeek)) return "current";
  return "pending";
}

/* ──────────────────────────── graph model ──────────────────────────── */
const nodes = [], edges = [], byId = {};
function addNode(n){
  n.x=(Math.random()-.5)*40; n.y=(Math.random()-.5)*40; n.z=(Math.random()-.5)*40;
  n.vx=n.vy=n.vz=0; n.seed=Math.random()*Math.PI*2;
  nodes.push(n); byId[n.id]=n; return n;
}
function addEdge(a,b,rest){ edges.push({a:byId[a], b:byId[b], rest}); }

addNode({id:"center", type:"center", r:24, label:"Shadow Monarch",
         desc:"The journey itself. Every phase completed evolves the Monarch.",
         link:REPO, status:"current", fixed:true});

for (const p of PHASES){
  addNode({id:p.id, type:"phase", r:14, label:p.name, ring:p.ring,
           desc:"Phase hub — " + p.weeks.length + " week(s).", link:REPO+"/blob/main/ROADMAP.md",
           status:"pending"});
  addEdge("center", p.id, 165);
  for (const w of p.weeks){
    addNode({id:"w"+w, type:"week", r:9.5, label:"W"+w+" · "+WEEK_NAMES[w],
             desc:"Week "+w+" — "+WEEK_NAMES[w],
             link: w===1 ? GUIDE1 : REPO+"/blob/main/ROADMAP.md", status:"pending"});
    addEdge(p.id, "w"+w, 78);
  }
}
for (let d=1; d<=7; d++){
  addNode({id:"d"+d, type:"day", r:6.5, label:"Day "+d,
           desc:"Day "+d+": "+DAY_NAMES[d-1], link:GUIDE1, status:"pending"});
  addEdge("w1", "d"+d, 46);
}
addNode({id:"gate", type:"gate", r:11, label:"Readiness Gate",
         desc:"8-item checklist in ROADMAP.md — pass it to unlock Deep Learning.",
         link:REPO+"/blob/main/ROADMAP.md#-deep-learning-readiness-gate", status:"pending"});
addEdge("w13","gate",95);
addNode({id:"dl", type:"dl", r:15, label:"🧠 Deep Learning",
         desc:"PyTorch · neural nets · the next module. Locked until the Gate opens.",
         link:REPO+"/blob/main/ROADMAP.md", status:"locked"});
addEdge("gate","dl",110);

function applyStatus(){
  for (const p of PHASES) byId[p.id].status = phaseStatus(p);
  for (let w=1; w<=13; w++) byId["w"+w].status = weekStatus(w);
  for (let d=1; d<=7;  d++) byId["d"+d].status = dayStatus(d);
  const allWeeks = Object.values(progress.weeks).every(v=>v);
  byId["gate"].status = allWeeks ? "current" : "pending";
  byId["center"].status = allWeeks ? "done" : "current";
}
function updateStats(){
  const wd = Object.values(progress.weeks).filter(v=>v).length;
  const dd = Object.values(progress.days).filter(v=>v).length;
  const total = 13*7, doneUnits = wd*7 + (progress.weeks[1] ? 0 : dd);
  document.getElementById("stW").textContent = wd + "/13";
  document.getElementById("stD").textContent = dd + "/7";
  document.getElementById("stP").textContent = Math.round(100*doneUnits/total) + "%";
}

/* ─────────────────────────── 3-D engine ────────────────────────────── */
const cv = document.getElementById("cv"), ctx = cv.getContext("2d");
const tip = document.getElementById("tip"), panel = document.getElementById("panel");
let W, H, DPR;
function resize(){
  DPR = Math.min(devicePixelRatio||1, 2);
  W = innerWidth; H = innerHeight;
  cv.width = W*DPR; cv.height = H*DPR;
  cv.style.width = W+"px"; cv.style.height = H+"px";
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
addEventListener("resize", resize); resize();

const stars = Array.from({length:130}, () => ({
  x:Math.random()*2-1, y:Math.random()*2-1, r:Math.random()*1.1+.3, tw:Math.random()*Math.PI*2}));

let rotY = .6, rotX = -.28, zoom = 1, autoSpin = true;
const FOV = 640;

function project(n){
  const cy=Math.cos(rotY), sy=Math.sin(rotY), cx=Math.cos(rotX), sx=Math.sin(rotX);
  const x1 = n.x*cy + n.z*sy, z1 = -n.x*sy + n.z*cy;
  const y2 = n.y*cx - z1*sx,  z2 =  n.y*sx + z1*cx;
  const s = FOV/(FOV + z2 + 320) * zoom;
  return {sx: W/2 + x1*s, sy: H/2 + y2*s, s, depth: z2};
}

function physics(t){
  for (let i=0;i<nodes.length;i++){
    const a = nodes[i];
    if (a.fixed){ a.x=a.y=a.z=0; continue; }
    for (let j=i+1;j<nodes.length;j++){
      const b = nodes[j];
      let dx=a.x-b.x, dy=a.y-b.y, dz=a.z-b.z;
      let d2 = dx*dx+dy*dy+dz*dz + 0.01, d = Math.sqrt(d2);
      const f = Math.min(2600/d2, 6)/d;
      a.vx+=dx*f; a.vy+=dy*f; a.vz+=dz*f;
      if(!b.fixed){ b.vx-=dx*f; b.vy-=dy*f; b.vz-=dz*f; }
    }
    // gentle centering + perpetual drift so the constellation never freezes
    a.vx -= a.x*.0012; a.vy -= a.y*.0012; a.vz -= a.z*.0012;
    a.vx += Math.sin(t*.00045 + a.seed)*.012;
    a.vy += Math.cos(t*.00038 + a.seed*1.7)*.012;
  }
  for (const e of edges){
    const dx=e.b.x-e.a.x, dy=e.b.y-e.a.y, dz=e.b.z-e.a.z;
    const d = Math.sqrt(dx*dx+dy*dy+dz*dz)+.001, f = (d-e.rest)*.02/d;
    if(!e.a.fixed){ e.a.vx+=dx*f; e.a.vy+=dy*f; e.a.vz+=dz*f; }
    if(!e.b.fixed){ e.b.vx-=dx*f; e.b.vy-=dy*f; e.b.vz-=dz*f; }
  }
  for (const n of nodes){
    if (n.fixed) continue;
    n.vx*=.88; n.vy*=.88; n.vz*=.88;
    n.x+=n.vx; n.y+=n.vy; n.z+=n.vz;
  }
}

const COLORS = {done:"#3fb950", current:"#a371f7", pending:"#7d8590", locked:"#30363d"};
let hoverNode = null;

function draw(t){
  ctx.clearRect(0,0,W,H);
  // starfield
  for (const s of stars){
    const a = .25 + .25*Math.sin(t*.001 + s.tw);
    ctx.fillStyle = "rgba(200,210,255," + a + ")";
    ctx.fillRect(W/2 + s.x*W/2, H/2 + s.y*H/2, s.r, s.r);
  }
  const proj = new Map();
  for (const n of nodes) proj.set(n, project(n));

  // edges
  for (const e of edges){
    const pa = proj.get(e.a), pb = proj.get(e.b);
    const bothDone = e.a.status==="done" && e.b.status==="done";
    const toCurrent = e.a.status==="current" || e.b.status==="current";
    const depthA = Math.max(.15, Math.min(1, (pa.s+pb.s)/2));
    ctx.strokeStyle = bothDone ? "rgba(63,185,80,"+(.5*depthA)+")"
                    : toCurrent ? "rgba(163,113,247,"+(.55*depthA)+")"
                    : "rgba(110,118,129,"+(.28*depthA)+")";
    ctx.lineWidth = (bothDone||toCurrent ? 1.4 : .8) * depthA;
    ctx.beginPath(); ctx.moveTo(pa.sx,pa.sy); ctx.lineTo(pb.sx,pb.sy); ctx.stroke();
  }

  // nodes back → front
  const order = [...nodes].sort((a,b)=>proj.get(b).depth - proj.get(a).depth);
  for (const n of order){
    const p = proj.get(n), r = n.r*p.s;
    const col = COLORS[n.status];
    // pulse ring on current
    if (n.status==="current"){
      const pulse = 1 + .35*Math.sin(t*.004 + n.seed);
      ctx.beginPath(); ctx.arc(p.sx,p.sy, r*1.5*pulse, 0, 7);
      ctx.strokeStyle = "rgba(163,113,247,.45)"; ctx.lineWidth = 1.6; ctx.stroke();
    }
    ctx.save();
    if (n.status==="done" || n.status==="current"){
      ctx.shadowColor = col; ctx.shadowBlur = 16*p.s;
    }
    ctx.beginPath(); ctx.arc(p.sx,p.sy, r, 0, 7);
    ctx.fillStyle = col;
    ctx.globalAlpha = n.status==="pending" ? .8 : 1;
    ctx.fill(); ctx.restore(); ctx.globalAlpha = 1;
    // phase ring (thematic identity, hubs are labeled)
    if (n.ring){
      ctx.beginPath(); ctx.arc(p.sx,p.sy, r+2.5, 0, 7);
      ctx.strokeStyle = n.ring; ctx.lineWidth = 1.8; ctx.stroke();
    }
    if (n === hoverNode){
      ctx.beginPath(); ctx.arc(p.sx,p.sy, r+5, 0, 7);
      ctx.strokeStyle = "rgba(230,237,243,.9)"; ctx.lineWidth = 1.4; ctx.stroke();
    }
    // status icons — status is never color-alone
    ctx.textAlign="center"; ctx.textBaseline="middle";
    if (n.status==="done" && r > 4){
      ctx.fillStyle="#04160a"; ctx.font = "bold "+Math.max(8, r*1.1)+"px sans-serif";
      ctx.fillText("✓", p.sx, p.sy+.5);
    } else if (n.status==="locked"){
      ctx.font = Math.max(9, r*1.0)+"px sans-serif"; ctx.fillText("🔒", p.sx, p.sy);
    }
    // labels: big nodes always, weeks when close, days on hover
    const showLabel = n.type==="center" || n.type==="phase" || n.type==="dl" || n.type==="gate"
                      || (n.type==="week" && p.s*zoom > .78) || n === hoverNode;
    if (showLabel){
      const fs = n.type==="center" ? 13 : n.type==="phase" ? 12 : 10.5;
      ctx.font = (n.type==="phase"||n.type==="center" ? "600 " : "") + fs + "px -apple-system,'Segoe UI',sans-serif";
      ctx.fillStyle = n.status==="pending" ? "rgba(154,164,178,.9)" : "rgba(230,237,243,.95)";
      ctx.fillText(n.label, p.sx, p.sy + r + fs*.9);
    }
  }
}

function frame(t){
  if (autoSpin && !dragging) rotY += .0016;
  physics(t); draw(t);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ─────────────────────────── interaction ───────────────────────────── */
let dragging=false, moved=false, px=0, py=0;
function nodeAt(mx,my){
  let best=null, bd=1e9;
  for (const n of nodes){
    const p = project(n), r = Math.max(n.r*p.s + 6, 13);
    const d = Math.hypot(mx-p.sx, my-p.sy);
    if (d < r && d < bd){ best=n; bd=d; }
  }
  return best;
}
cv.addEventListener("pointerdown", e=>{
  dragging=true; moved=false; px=e.clientX; py=e.clientY;
  cv.classList.add("dragging"); cv.setPointerCapture(e.pointerId);
});
cv.addEventListener("pointermove", e=>{
  if (dragging){
    const dx=e.clientX-px, dy=e.clientY-py;
    if (Math.abs(dx)+Math.abs(dy) > 3) moved=true;
    rotY += dx*.005; rotX += dy*.004;
    rotX = Math.max(-1.2, Math.min(1.2, rotX));
    px=e.clientX; py=e.clientY;
  } else {
    hoverNode = nodeAt(e.clientX, e.clientY);
    cv.style.cursor = hoverNode ? "pointer" : "grab";
    if (hoverNode){
      tip.style.display="block";
      tip.style.left = Math.min(e.clientX+14, W-250)+"px";
      tip.style.top  = (e.clientY+14)+"px";
      tip.innerHTML = "<div class='t'>"+hoverNode.label+"</div><div class='s'>"
                    + hoverNode.status + " · " + hoverNode.desc + "</div>";
    } else tip.style.display="none";
  }
});
cv.addEventListener("pointerup", e=>{
  cv.classList.remove("dragging");
  if (!moved){
    const n = nodeAt(e.clientX, e.clientY);
    if (n) openPanel(n); else panel.style.display="none";
  }
  dragging=false;
});
cv.addEventListener("wheel", e=>{
  e.preventDefault();
  zoom = Math.max(.45, Math.min(2.6, zoom * (e.deltaY<0 ? 1.09 : .92)));
},{passive:false});

const BADGE = {done:["✓ done","#12261a","#3fb950"], current:["▶ current","#231a33","#c9a8ff"],
               pending:["… pending","#1a1f27","#9aa4b2"], locked:["🔒 locked","#161a20","#6e7681"]};
function openPanel(n){
  document.getElementById("pTitle").textContent = n.label;
  const b = BADGE[n.status], bEl = document.getElementById("pBadge");
  bEl.textContent = b[0]; bEl.style.background=b[1]; bEl.style.color=b[2];
  document.getElementById("pDesc").textContent = n.desc;
  const a = document.getElementById("pLink");
  a.href = n.link; a.textContent = "Open on GitHub ↗";
  panel.style.display = "block";
}

loadProgress();
</script>
</body>
</html>
